server:
  port: 8888

spring:
  application:
    name: booking-gateway

  # ── Security ───────────────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/booking-realm
          jwk-set-uri: http://localhost:8080/realms/booking-realm/protocol/openid-connect/certs

  # ── Redis (Rate Limiter) ───────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ── Cloud Gateway Routes ───────────────────────────────────────────────
  cloud:
    gateway:
      default-filters:
        # Прокидываем JWT-токен во все downstream сервисы
        - TokenRelay=
      routes:

        # booking-service
        - id: booking-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # resource-service
        - id: resource-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/resources/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60

        # notification-service (internal only, но пусть будет)
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/notifications/**

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, gateway

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: INFO
