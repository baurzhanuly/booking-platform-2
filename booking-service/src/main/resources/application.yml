server:
  port: 8082

spring:
  application:
    name: booking-service

  # ── DataSource ─────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_db
    username: booking_user
    password: booking_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA ────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway управляет схемой, Hibernate только валидирует
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Flyway ─────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Keycloak / OAuth2 Resource Server ─────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak выдаёт токены — Spring Boot автоматически скачивает публичный ключ
          issuer-uri: http://localhost:8080/realms/booking-realm
          jwk-set-uri: http://localhost:8080/realms/booking-realm/protocol/openid-connect/certs

  # ── Kafka ──────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: booking-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.booking.*"

  # ── Redis ──────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# ── Camunda 8 / Zeebe ──────────────────────────────────────────────────────
camunda:
  client:
    zeebe:
      gateway-address: localhost:26500
      security:
        plaintext: true   # отключаем TLS для локальной разработки
    worker:
      defaults:
        max-jobs-active: 32

# ── Actuator / Management ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0   # 100% трейсинг в dev, снизить до 0.1 в prod

# ── OpenAPI / Swagger ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth2-redirect-url: http://localhost:8082/swagger-ui/oauth2-redirect.html

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.booking: DEBUG
    org.springframework.security: INFO
    io.camunda: INFO
    org.apache.kafka: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
